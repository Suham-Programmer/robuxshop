<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Orders</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,Helvetica,sans-serif;
}

body{
    background:#111827;
    color:white;
    padding:40px;
}

h1{
    text-align:center;
    margin-bottom:30px;
}

#userEmail{
    text-align:center;
    color:#00ff99;
    margin-bottom:30px;
}

.order{
    background:#1f2937;
    border-radius:15px;
    padding:20px;
    margin:20px auto;
    max-width:700px;
    box-shadow:0 0 15px rgba(0,0,0,.3);
}

.order h2{
    color:#00ff99;
    margin-bottom:10px;
}

.order p{
    margin:8px 0;
}

.status{
    font-weight:bold;
    color:gold;
}

.home{
    display:block;
    width:220px;
    margin:40px auto;
    padding:15px;
    border:none;
    border-radius:10px;
    background:#3498db;
    color:white;
    font-size:18px;
    cursor:pointer;
}

.home:hover{
    background:#217dbb;
}
</style>

</head>

<body>

<h1>My Orders</h1>

<h3 id="userEmail"></h3>

<div id="orders"></div>

<button class="home" onclick="window.location.href='robloxmain.html'">
🏠 Back to Shop
</button>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";

import {
    getFirestore,
    collection,
    query,
    where,
    onSnapshot
} from "https://www.gstatic.com/firebasejs/12.0.0/firebase-firestore.js";

import {
    getAuth,
    onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/12.0.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyAQyV8ACphNSYGQWflbTYYJZAJOtfy3DUs",
  authDomain: "robux-shop-main.firebaseapp.com",
  projectId: "robux-shop-main",
  storageBucket: "robux-shop-main.firebasestorage.app",
  messagingSenderId: "431281623609",
  appId: "1:431281623609:web:9659ae9ef6daf6bb3c33e8",
  measurementId: "G-DG8P1VJJC7"
};

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);
const auth = getAuth(app);

onAuthStateChanged(auth,(user)=>{

    if(!user){

        window.location.href="login.html";
        return;

    }

    document.getElementById("userEmail").innerHTML=user.email;

    const q=query(
        collection(db,"orders"),
        where("uid","==",user.uid)
    );

    onSnapshot(q,(snapshot)=>{

        const orders=document.getElementById("orders");

        orders.innerHTML="";

        snapshot.forEach((doc)=>{

            const data=doc.data();

            orders.innerHTML+=`

            <div class="order">

                <h2>${data.orderId}</h2>

                <p><b>Roblox Username:</b> ${data.username}</p>

                <p><b>Pack:</b> ${data.pack}</p>

                <p><b>Price:</b> ${data.price}</p>

                <p><b>Payment:</b> ${data.payment}</p>

                <p class="status"><b>Status:</b> ${data.status}</p>

            </div>

            `;

        });

    });

});

</script>

</body>
</html>
