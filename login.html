<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,Helvetica,sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;

    background:
    radial-gradient(circle at top,#1eff8e 0%,transparent 35%),
    radial-gradient(circle at bottom right,#00b35a 0%,transparent 25%),
    linear-gradient(135deg,#0f172a,#111827,#000000);
}

.login-box{

    width:400px;
    background:white;
    border-radius:20px;
    padding:35px;
    text-align:center;

    box-shadow:0 10px 35px rgba(0,0,0,.4);

}

h1{
    margin-bottom:30px;
}

input{

    width:100%;
    padding:15px;
    margin:10px 0;

    border:1px solid #ccc;
    border-radius:10px;

    font-size:16px;

}

button{

    width:100%;
    padding:15px;

    margin-top:20px;

    border:none;
    border-radius:10px;

    background:#00a651;
    color:white;

    font-size:18px;

    cursor:pointer;

}

button:hover{

    background:#00863d;

}

a{

    display:block;
    margin-top:20px;
    text-decoration:none;

}
</style>

</head>

<body>

<div class="login-box">

<h1>Login</h1>

<input
type="email"
id="email"
placeholder="Email">

<input
type="password"
id="password"
placeholder="Password">

<button onclick="login()">

Login

</button>

<a href="signup.html">

Create New Account

</a>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";

import {

getAuth,
signInWithEmailAndPassword

}
from "https://www.gstatic.com/firebasejs/12.0.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyAQyV8ACphNSYGQWflbTYYJZAJOtfy3DUs",
  authDomain: "robux-shop-main.firebaseapp.com",
  projectId: "robux-shop-main",
  storageBucket: "robux-shop-main.firebasestorage.app",
  messagingSenderId: "431281623609",
  appId: "1:431281623609:web:9659ae9ef6daf6bb3c33e8",
  measurementId: "G-DG8P1VJJC7"
};

const app = initializeApp(firebaseConfig);

const auth = getAuth(app);

window.login = async function(){

const email=document.getElementById("email").value;

const password=document.getElementById("password").value;

try{

await signInWithEmailAndPassword(auth,email,password);

alert("Login Successful!");

window.location.href="robloxmain.html";

}

catch(error){

alert(error.message);

}

}

</script>

</body>
</html>
